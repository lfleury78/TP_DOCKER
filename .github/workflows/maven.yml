name: Java CI with Maven

on:
  push:
    branches: [ "main","terraform","test","test-api" ]
  pull_request:
    branches: [ "main","terraform" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Verify Java version
      run: java -version

    - name: Build, test and generate JaCoCo report
      run: mvn -B verify --file pom.xml

  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    defaults:
      run:
        working-directory: infra/terraform

    steps:
    - uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Authenticate to Google Cloud (OIDC)
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Terraform Format Check
      run: terraform fmt -check -recursive

    - name: Terraform Init
      run: terraform init

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -input=false -var-file=terraform.tfvars

    - name: Terraform Apply (terraform/main only)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/terraform' || github.ref == 'refs/heads/main')
      run: terraform apply -auto-approve -input=false -var-file=terraform.tfvars